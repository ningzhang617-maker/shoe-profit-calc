<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业档案知识库</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f5f5f5; color: #333; min-height: 100vh;
}

/* Layout */
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: 260px; background: #1e293b; color: #fff;
  display: flex; flex-direction: column; flex-shrink: 0;
  transition: transform 0.3s;
}
.sidebar-header {
  padding: 16px; border-bottom: 1px solid #334155;
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-header h2 { font-size: 17px; }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }

.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; cursor: pointer; font-size: 14px;
  color: #cbd5e1; transition: all 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: #334155; color: #fff; }
.nav-item.active { background: #334155; color: #fff; border-left-color: #3b82f6; }
.nav-item .count { margin-left: auto; font-size: 11px; background: #475569; padding: 2px 8px; border-radius: 10px; }
.nav-item.all { font-weight: 600; margin-bottom: 4px; }

.category-list { }
.cat-item {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px; cursor: pointer; font-size: 13px;
  color: #94a3b8; transition: all 0.15s;
}
.cat-item:hover { color: #fff; background: #1e293b; }
.cat-item.active { color: #60a5fa; font-weight: 600; }
.cat-item .cat-del { margin-left: auto; opacity: 0; font-size: 14px; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
.cat-item:hover .cat-del { opacity: 0.6; }
.cat-item .cat-del:hover { opacity: 1; background: #ef4444; color: #fff; }

.sidebar-footer { padding: 12px 16px; border-top: 1px solid #334155; font-size: 12px; color: #64748b; }
.sidebar-footer a { color: #60a5fa; text-decoration: none; }
.sidebar-footer a:hover { text-decoration: underline; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Top bar */
.topbar {
  background: #fff; padding: 10px 20px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid #e5e7eb; flex-shrink: 0;
}
.menu-btn {
  display: none; background: none; border: none; font-size: 22px;
  cursor: pointer; padding: 4px 8px; color: #666;
}
.search-box {
  flex: 1; max-width: 400px;
  padding: 9px 14px; border: 2px solid #e5e7eb; border-radius: 10px;
  font-size: 14px; background: #f9fafb; transition: all 0.2s;
}
.search-box:focus { outline: none; border-color: #3b82f6; background: #fff; }
.btn {
  padding: 9px 18px; border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  font-family: inherit;
}
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-outline { background: #fff; color: #666; border: 1.5px solid #e5e7eb; }
.btn-outline:hover { background: #f5f5f5; }
.btn-sm { padding: 5px 12px; font-size: 11px; }

/* Content area */
.content { flex: 1; overflow-y: auto; padding: 20px; }

/* Article list */
.article-list { }
.article-item {
  background: #fff; border-radius: 10px; padding: 16px 20px;
  margin-bottom: 8px; cursor: pointer; transition: all 0.15s;
  border: 1.5px solid #f0f0f0; display: flex; align-items: center; gap: 14px;
}
.article-item:hover { border-color: #93c5fd; box-shadow: 0 2px 8px rgba(59,130,246,0.08); }
.article-item .ai-icon { font-size: 28px; }
.article-item .ai-body { flex: 1; min-width: 0; }
.article-item .ai-title { font-size: 15px; font-weight: 600; }
.article-item .ai-preview { font-size: 12px; color: #999; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.article-item .ai-meta { text-align: right; flex-shrink: 0; }
.article-item .ai-cat { font-size: 11px; background: #eff6ff; color: #3b82f6; padding: 3px 10px; border-radius: 10px; }
.article-item .ai-date { font-size: 11px; color: #bbb; margin-top: 4px; }

.empty-state {
  text-align: center; padding: 60px 20px; color: #ccc;
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* Editor */
.editor-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4); z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
.editor-panel {
  background: #fff; border-radius: 14px; width: 90%; max-width: 800px;
  max-height: 90vh; display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.editor-header {
  padding: 16px 20px; border-bottom: 1px solid #f0f0f0;
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.editor-header input { flex: 1; font-size: 18px; font-weight: 600; border: none; outline: none; font-family: inherit; }
.editor-header select {
  padding: 6px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px;
  font-size: 13px; background: #fff; cursor: pointer;
}

.editor-body { display: flex; flex: 1; overflow: hidden; }
.editor-textarea, .editor-preview {
  flex: 1; padding: 16px 20px; overflow-y: auto;
}
.editor-textarea {
  border: none; resize: none; font-size: 14px; line-height: 1.7;
  font-family: 'SF Mono', 'Consolas', 'Courier New', monospace;
  outline: none; border-right: 1px solid #f0f0f0;
}
.editor-preview { font-size: 14px; line-height: 1.8; color: #444; }

.editor-footer {
  padding: 12px 20px; border-top: 1px solid #f0f0f0;
  display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0;
}

/* Markdown rendered */
.md h1 { font-size: 22px; margin: 16px 0 8px; border-bottom: 2px solid #f0f0f0; padding-bottom: 6px; }
.md h2 { font-size: 18px; margin: 14px 0 6px; }
.md h3 { font-size: 16px; margin: 12px 0 4px; }
.md p { margin: 8px 0; }
.md ul, .md ol { padding-left: 20px; margin: 8px 0; }
.md li { margin: 4px 0; }
.md code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.md pre { background: #1e293b; color: #e2e8f0; padding: 14px; border-radius: 8px; overflow-x: auto; margin: 10px 0; }
.md pre code { background: none; padding: 0; color: inherit; }
.md blockquote { border-left: 3px solid #3b82f6; padding-left: 12px; color: #888; margin: 10px 0; }
.md a { color: #3b82f6; }
.md strong { font-weight: 700; }
.md hr { border: none; border-top: 1px solid #e5e7eb; margin: 16px 0; }

/* Toast */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #1e293b; color: #fff; padding: 10px 24px; border-radius: 20px;
  font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* Overlay for sidebar */
.sidebar-overlay { display: none; }

/* Mobile */
@media (max-width: 700px) {
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; z-index: 50;
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay {
    display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 49;
  }
  .menu-btn { display: block; }
  .editor-body { flex-direction: column; }
  .editor-textarea { border-right: none; border-bottom: 1px solid #f0f0f0; min-height: 200px; }
  .editor-panel { width: 96%; max-height: 96vh; }
  .topbar { padding: 10px 12px; gap: 8px; }
  .search-box { max-width: none; }
  .content { padding: 12px; }
  .article-item { padding: 12px 14px; }
}
</style>
</head>
<body>
<div class="app">

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>📚 知识库</h2>
    <button onclick="toggleSidebar()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;">✕</button>
  </div>
  <div class="sidebar-nav">
    <div class="nav-item all active" onclick="filterByCat('all')">
      📄 全部文档 <span class="count" id="countAll">0</span>
    </div>
    <div class="nav-item" onclick="showAddCat()">
      ➕ 新建分类
    </div>
    <div class="category-list" id="categoryList"></div>
  </div>
  <div class="sidebar-footer">
    <a href="index.html">← 利润计算器</a>
    <div style="margin-top:4px;">
      <button onclick="exportData()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:11px;">📤 导出</button>
      <button onclick="document.getElementById('importFile').click()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:11px;margin-left:8px;">📥 导入</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <input class="search-box" type="text" id="searchInput" placeholder="🔍 搜索文档..." oninput="renderArticles()">
    <button class="btn btn-primary" onclick="openEditor()">＋ 新建文档</button>
  </div>

  <div class="content">
    <div class="article-list" id="articleList"></div>
  </div>
</div>
</div>

<!-- Editor Modal -->
<div class="editor-overlay" id="editorOverlay" style="display:none;">
  <div class="editor-panel">
    <div class="editor-header">
      <span style="font-size:20px;">📝</span>
      <input type="text" id="editTitle" placeholder="文档标题..." autocomplete="off">
      <select id="editCategory">
        <option value="">未分类</option>
      </select>
    </div>
    <div class="editor-body">
      <textarea class="editor-textarea" id="editContent" placeholder="输入内容，支持 Markdown 格式...&#10;&#10;# 标题&#10;**粗体** *斜体*&#10;- 列表项&#10;`行内代码`&#10;&gt; 引用"></textarea>
      <div class="editor-preview md" id="editPreview"></div>
    </div>
    <div class="editor-footer">
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('editPreview').style.display=document.getElementById('editPreview').style.display==='none'?'block':'none'">👁 预览</button>
      <span style="flex:1;"></span>
      <span style="font-size:11px;color:#999;align-self:center;" id="editId" data-id=""></span>
      <button class="btn btn-outline" onclick="closeEditor()">取消</button>
      <button class="btn btn-primary" onclick="saveArticle()">💾 保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== Data Store ==========
const DB_KEY = 'kb_data_v1';

function getDB() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    return raw ? JSON.parse(raw) : { articles: [], categories: [] };
  } catch(e) { return { articles: [], categories: [] }; }
}

function saveDB(db) {
  localStorage.setItem(DB_KEY, JSON.stringify(db));
}

// ========== State ==========
let currentFilter = 'all';
let editingId = null;

// ========== Categories ==========
function renderCategories() {
  const db = getDB();
  const container = document.getElementById('categoryList');
  container.innerHTML = db.categories.map(c => `
    <div class="cat-item ${currentFilter === c ? 'active' : ''}" onclick="filterByCat('${c.replace(/'/g,"\\'")}')">
      📁 ${c}
      <span class="cat-del" onclick="event.stopPropagation();deleteCategory('${c.replace(/'/g,"\\'")}')">✕</span>
    </div>
  `).join('');

  // Update editor category select
  const sel = document.getElementById('editCategory');
  sel.innerHTML = '<option value="">未分类</option>' + db.categories.map(c => `<option value="${c}">${c}</option>`).join('');

  // Count
  document.getElementById('countAll').textContent = db.articles.length;
}

function showAddCat() {
  const name = prompt('输入新分类名称：');
  if (!name || !name.trim()) return;
  const db = getDB();
  if (db.categories.includes(name.trim())) {
    toast('该分类已存在');
    return;
  }
  db.categories.push(name.trim());
  saveDB(db);
  renderCategories();
  toast('分类已创建');
}

function deleteCategory(name) {
  if (!confirm('删除分类 "' + name + '"？文档不会删除，会变为未分类。')) return;
  const db = getDB();
  db.categories = db.categories.filter(c => c !== name);
  db.articles.forEach(a => { if (a.category === name) a.category = ''; });
  saveDB(db);
  if (currentFilter === name) currentFilter = 'all';
  renderCategories();
  renderArticles();
  toast('分类已删除');
}

function filterByCat(cat) {
  currentFilter = cat;
  document.querySelectorAll('.nav-item.all').forEach(el => el.classList.toggle('active', cat === 'all'));
  document.querySelectorAll('.cat-item').forEach(el => el.classList.toggle('active', el.textContent.trim().startsWith('📁 ' + cat)));
  renderArticles();
}

// ========== Articles ==========
function renderArticles() {
  const db = getDB();
  const search = (document.getElementById('searchInput').value || '').toLowerCase();

  let articles = db.articles;
  if (currentFilter !== 'all') {
    articles = articles.filter(a => a.category === currentFilter);
  }
  if (search) {
    articles = articles.filter(a =>
      a.title.toLowerCase().includes(search) ||
      (a.content || '').toLowerCase().includes(search) ||
      (a.category || '').toLowerCase().includes(search)
    );
  }

  // Sort by updated desc
  articles.sort((a, b) => (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0));

  const container = document.getElementById('articleList');
  if (articles.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>${search ? '没有匹配的文档' : '还没有文档，点击「新建文档」开始'}</p>
      </div>`;
    return;
  }

  container.innerHTML = articles.map(a => {
    const preview = (a.content || '').replace(/[#*`>\-\[\]\(\)]/g, '').substring(0, 80);
    const date = new Date(a.updatedAt || a.createdAt || Date.now());
    const timeStr = date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const icon = a.content && a.content.length > 200 ? '📄' : '📝';
    return `
      <div class="article-item" onclick="openEditor('${a.id}')">
        <div class="ai-icon">${icon}</div>
        <div class="ai-body">
          <div class="ai-title">${a.title || '无标题'}</div>
          <div class="ai-preview">${preview || '空文档'}</div>
        </div>
        <div class="ai-meta">
          ${a.category ? `<div class="ai-cat">${a.category}</div>` : ''}
          <div class="ai-date">${timeStr}</div>
        </div>
      </div>`;
  }).join('');
}

function openEditor(id) {
  const db = getDB();
  if (id) {
    const article = db.articles.find(a => a.id === id);
    if (!article) return;
    document.getElementById('editTitle').value = article.title;
    document.getElementById('editContent').value = article.content || '';
    document.getElementById('editCategory').value = article.category || '';
    document.getElementById('editId').textContent = '编辑：' + id;
    document.getElementById('editId').dataset.id = id;
    editingId = id;
  } else {
    document.getElementById('editTitle').value = '';
    document.getElementById('editContent').value = '';
    document.getElementById('editCategory').value = '';
    document.getElementById('editId').textContent = '';
    document.getElementById('editId').dataset.id = '';
    editingId = null;
  }
  document.getElementById('editorOverlay').style.display = 'flex';
  document.getElementById('editTitle').focus();
  updatePreview();
}

function closeEditor() {
  document.getElementById('editorOverlay').style.display = 'none';
  editingId = null;
}

function saveArticle() {
  const title = document.getElementById('editTitle').value.trim();
  const content = document.getElementById('editContent').value;
  const category = document.getElementById('editCategory').value;
  const db = getDB();
  const now = Date.now();

  if (editingId) {
    const idx = db.articles.findIndex(a => a.id === editingId);
    if (idx >= 0) {
      db.articles[idx].title = title;
      db.articles[idx].content = content;
      db.articles[idx].category = category;
      db.articles[idx].updatedAt = now;
    }
  } else {
    db.articles.push({
      id: 'a_' + now + '_' + Math.random().toString(36).slice(2, 6),
      title, content, category,
      createdAt: now,
      updatedAt: now
    });
  }

  saveDB(db);
  closeEditor();
  renderCategories();
  renderArticles();
  toast(editingId ? '已更新' : '已创建');
}

function deleteArticle(id) {
  if (!confirm('确定删除这篇文档？')) return;
  const db = getDB();
  db.articles = db.articles.filter(a => a.id !== id);
  saveDB(db);
  renderCategories();
  renderArticles();
  closeEditor();
  toast('已删除');
}

// ========== Markdown Preview ==========
function updatePreview() {
  const content = document.getElementById('editContent').value;
  document.getElementById('editPreview').innerHTML = renderMD(content);
}

function renderMD(text) {
  if (!text) return '<span style="color:#ccc;">预览区域</span>';
  let html = text
    // Escape HTML
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // Headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Bold & italic
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    // Blockquote
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    // Horizontal rule
    .replace(/^---$/gm, '<hr>')
    // Unordered list
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    // Wrap consecutive <li> in <ul>
    .replace(/(<li>.*<\/li>)\n(?=<li>)/g, '$1')
    .replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    // Line breaks
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');

  return '<p>' + html + '</p>';
}

// Live preview
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('editContent').addEventListener('input', updatePreview);
});

// ========== Sidebar Toggle ==========
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ========== Data Export/Import ==========
function exportData() {
  const db = getDB();
  const blob = new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '知识库备份_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('数据已导出');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.articles || !data.categories) throw new Error('格式错误');
      if (confirm('导入将覆盖现有数据，确定继续？\n（建议先导出备份）')) {
        saveDB(data);
        renderCategories();
        renderArticles();
        toast('成功导入 ' + data.articles.length + ' 篇文档');
      }
    } catch(err) {
      alert('文件格式不正确');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ========== Toast ==========
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ========== Keyboard Shortcuts ==========
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeEditor();
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (document.getElementById('editorOverlay').style.display === 'flex') saveArticle();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// ========== Init ==========
renderCategories();
renderArticles();
</script>
</body>
</html>
